<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title>PDF ⇄ JPG Converter - WebTools</title>
    <meta name="description"
        content="Convert PDF to JPG images or merge JPGs back into a single PDF — instantly, securely, and free. Simple drag-and-drop online PDF ⇄ JPG converter by WebTools.">
    <meta name="keywords"
        content="pdf to jpg, jpg to pdf, convert pdf, image to pdf, pdf converter, jpg converter, online tools, webtools">
    <meta property="og:title" content="PDF ⇄ JPG Converter - WebTools">
    <meta property="og:description"
        content="Fast, free, and secure PDF ⇄ JPG converter. Convert PDFs to images or merge JPGs into a PDF in seconds — no signup required.">
    <meta property="og:type" content="website">
    <meta property="og:site_name" content="WebTools">
    <meta name="robots" content="index, follow">
    <link rel="canonical" href="https://mywebtools.it.com/pdf-image" />

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">

</head>

<body class="bg-light">
    <!-- Header Fragment -->
    <div th:replace="fragments/header :: header"></div>

    <div class="container py-4">
        <div class="card shadow-sm">
            <div class="card-body">
                <h3 class="card-title text-center mb-4">
                    <i class="bi bi-file-earmark-image"></i> PDF ⇄ JPG Converter
                </h3>

                <ul class="nav nav-tabs mb-3" id="pdfTab" role="tablist">
                    <li class="nav-item" role="presentation">
                        <button class="nav-link active" id="pdfToJpg-tab" data-bs-toggle="tab"
                            data-bs-target="#pdfToJpg" type="button" role="tab">PDF → JPG</button>
                    </li>
                    <li class="nav-item" role="presentation">
                        <button class="nav-link" id="jpgToPdf-tab" data-bs-toggle="tab" data-bs-target="#jpgToPdf"
                            type="button" role="tab">JPG → PDF</button>
                    </li>
                </ul>

                <div class="tab-content">
                    <!-- PDF → JPG -->
                    <div class="tab-pane fade show active" id="pdfToJpg" role="tabpanel">
                        <div id="pdfDropZone"
                            class="border border-2 border-primary rounded text-center py-5 mb-4 bg-light-subtle">
                            <i class="bi bi-file-earmark-pdf display-5 text-primary"></i>
                            <h5 class="mt-2">Drop PDF here or click to upload</h5>
                            <input type="file" id="pdfInput" accept="application/pdf" class="form-control d-none">
                        </div>

                        <!-- Button container with proper alignment -->
                        <div class="d-flex align-items-center mb-3">
                            <button id="convertPdfBtn" class="btn btn-primary me-2">
                                <i class="bi bi-arrow-repeat"></i> Convert
                            </button>
                            <button id="resetPdfBtn" class="btn btn-outline-secondary">
                                <i class="bi bi-arrow-clockwise"></i> Reset
                            </button>
                        </div>
                        <div id="jpgOutput" class="d-flex flex-wrap gap-3"></div>
                    </div>

                    <!-- JPG → PDF -->
                    <div class="tab-pane fade" id="jpgToPdf" role="tabpanel">
                        <div id="jpgDropZone"
                            class="border border-2 border-success rounded text-center py-5 mb-4 bg-light-subtle">
                            <i class="bi bi-image display-5 text-success"></i>
                            <h5 class="mt-2">Drop JPG/PNG images here or click to upload</h5>
                            <input type="file" id="jpgInput" accept="image/*" multiple class="form-control d-none">
                        </div>

                        <!-- Button container with proper alignment -->
                        <div class="d-flex align-items-center mb-3">
                            <button id="convertJpgBtn" class="btn btn-primary me-2">
                                <i class="bi bi-arrow-repeat"></i> Convert to PDF
                            </button>
                            <button id="resetJpgBtn" class="btn btn-outline-secondary me-2">
                                <i class="bi bi-arrow-clockwise"></i> Reset
                            </button>
                            <a id="downloadPdfLink" class="btn btn-success d-none">
                                <i class="bi bi-download"></i> Download PDF
                            </a>
                        </div>
                    </div>

                </div>
            </div>
        </div>
    </div>

n
    <div th:replace="fragments/footer :: footer"></div>
    <script defer src="js/pdf-tools.js"></script>
</body>

</html>
