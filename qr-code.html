<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title>QR Code Generator & Scanner - WebTools</title>
    <meta name="description"
        content="Generate or scan QR codes instantly using your browser. Free online QR code generator and scanner.">
    <meta property="og:type" content="website">
    <meta property="og:site_name" content="WebTools">
    <meta name="robots" content="index, follow">
    <link rel="canonical" href="https://mywebtools.it.com/qr-code" />
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
</head>

<body class="bg-light">
    <!-- Header Fragment -->
    <div th:replace="fragments/header :: header"></div>

    <div class="container py-4">
        <div class="card shadow-sm">
            <div class="card-body">
                <h3 class="card-title text-center mb-4">
                    <i class="bi bi-qr-code"></i> QR Code Generator & Scanner
                </h3>

                <!-- Tabs -->
                <ul class="nav nav-tabs mb-3" id="qrTab" role="tablist">
                    <li class="nav-item" role="presentation">
                        <button class="nav-link active" id="generate-tab" data-bs-toggle="tab"
                            data-bs-target="#generate" type="button" role="tab" aria-controls="generate"
                            aria-selected="true"><i class="bi bi-plus-circle"></i> Generate</button>
                    </li>
                    <li class="nav-item" role="presentation">
                        <button class="nav-link" id="scan-tab" data-bs-toggle="tab" data-bs-target="#scan" type="button"
                            role="tab" aria-controls="scan" aria-selected="false"><i class="bi bi-camera"></i>
                            Scan</button>
                    </li>
                </ul>

                <div class="tab-content" id="qrTabContent">
                    <!-- Generator Tab -->
                    <div class="tab-pane fade show active" id="generate" role="tabpanel" aria-labelledby="generate-tab">
                        <div class="row align-items-center">
                            <div class="col-md-6">
                                <label for="qrText" class="form-label fw-bold">Enter text or URL:</label>
                                <textarea id="qrText" class="form-control mb-3" rows="3"
                                    placeholder="https://example.com"></textarea>

                                <div class="d-flex align-items-center mb-3">
                                    <button id="generateBtn" class="btn btn-primary me-2">
                                        <i class="bi bi-qr-code"></i> Generate QR
                                    </button>
                                    <button id="downloadBtn" class="btn btn-outline-secondary" disabled>
                                        <i class="bi bi-download"></i> Download
                                    </button>
                                </div>
                            </div>
                            <div class="col-md-6 text-center mt-3 mt-md-0">
                                <div id="qrcode" class="d-inline-block p-3 border rounded bg-white">
                                    <p class="text-muted mb-0">QR code will appear here</p>
                                </div>
                            </div>
                        </div>
                    </div>

                    <!-- Scanner Tab -->
                    <div class="tab-pane fade" id="scan" role="tabpanel" aria-labelledby="scan-tab">
                        <div class="row mt-3 gy-4">
                            <!-- Left Column: Live Camera Scanner -->
                            <div class="col-md-6">
                                <h5 class="fw-bold mb-3"><i class="bi bi-camera-video"></i> Live Camera Scan</h5>
                                <div id="reader" class="border rounded bg-light"
                                    style="min-height: 300px; display: flex; align-items: center; justify-content: center;">
                                    <p class="text-muted text-center">Camera scanner will initialize here</p>
                                </div>

                                <div class="d-flex flex-wrap mt-3" id="scannerControls">
                                    <!-- Start button - NOW EXPLICITLY IN HTML -->
                                    <button id="startScan" class="btn btn-primary me-2 mb-2">
                                        <i class="bi bi-camera-video"></i> Start Scanner
                                    </button>
                                    <button id="stopScan" class="btn btn-outline-danger me-2 mb-2" disabled>
                                        <i class="bi bi-stop-circle"></i> Stop Scanner
                                    </button>
                                </div>

                                <div class="mt-3">
                                    <div id="scannerStatus" class="alert alert-info d-none">
                                        Scanner is running... Point camera at QR code
                                    </div>
                                </div>

                                <hr class="my-4">

                                <h6 class="fw-bold"><i class="bi bi-image"></i> Upload Image to Scan</h6>
                                <input type="file" id="qrFile" accept="image/*" class="form-control mt-2">
                                <small class="text-muted">Select a saved QR code image (.png, .jpg, .jpeg)</small>

                                <div id="fileScanStatus" class="mt-2"></div>
                            </div>

                            <!-- Right Column: Scan Result -->
                            <div class="col-md-6">
                                <h5 class="fw-bold mb-3"><i class="bi bi-card-text"></i> Scan Result</h5>
                                <textarea id="scanResult" class="form-control mb-2" rows="5"
                                    placeholder="Scanned text or URL will appear here..." readonly></textarea>
                                <button id="copyResult" class="btn btn-outline-primary" disabled>
                                    <i class="bi bi-clipboard"></i> Copy
                                </button>
                                <button id="clearResult" class="btn btn-outline-secondary ms-2">
                                    <i class="bi bi-x-circle"></i> Clear
                                </button>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div th:replace="fragments/footer :: footer"></div>

    <script src="https://cdn.jsdelivr.net/npm/qrcodejs@1.0.0/qrcode.min.js"></script>
    <script src="js/html5-qrcode.min.js"></script>

    <script src="js/qr-code.js"></script>
</body>

</html>
