<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title>Temperature Converter - WebTools</title>
    <meta name="description" content="Convert temperatures between Celsius, Fahrenheit, and Kelvin instantly with the WebTools Temperature Converter." />
    <meta property="og:type" content="website">
    <meta property="og:site_name" content="WebTools">
    <meta name="robots" content="index, follow">
    <link rel="canonical" href="https://mywebtools.it.com/temperature-converter" />
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
</head>

<body class="bg-light">

    <!-- Header Fragment -->
    <div th:replace="fragments/header :: header"></div>

    <div class="container py-4">
        <div class="card shadow-sm">
            <div class="card-body">
                <h3 class="card-title mb-4 text-center"><i class="bi bi-thermometer-half"></i> Temperature Converter
                </h3>
                <p class="text-muted text-center mb-4">
                    Convert between Celsius (°C), Fahrenheit (°F), and Kelvin (K) instantly.
                </p>

                <div class="row justify-content-center">
                    <div class="col-md-6">
                        <label for="tempInput" class="form-label fw-bold">Enter Temperature:</label>
                        <input type="number" id="tempInput" class="form-control" placeholder="e.g., 25">

                        <label for="scaleSelect" class="form-label mt-3 fw-bold">From Scale:</label>
                        <select id="scaleSelect" class="form-select">
                            <option value="C">Celsius (°C)</option>
                            <option value="F">Fahrenheit (°F)</option>
                            <option value="K">Kelvin (K)</option>
                        </select>

                        <button class="btn btn-primary w-100 mt-4" onclick="convertTemperature()">Convert</button>

                        <div class="mt-4 text-center" id="tempResult" style="min-height: 40px;"></div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div th:replace="fragments/footer :: footer"></div>

</body>

</html>
