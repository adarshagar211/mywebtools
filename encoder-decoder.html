<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title>Base64 Encoder & Decoder – WebTools</title>
    <meta name="description"
        content="Free online Base64 Encoder & Decoder by WebTools. Convert strings and files to Base64 or decode Base64 text easily." />
    <meta property="og:type" content="website">
    <meta property="og:site_name" content="WebTools">
    <meta name="robots" content="index, follow">

    <link rel="canonical" href="https://mywebtools.it.com/encoder-decoder" />
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">

</head>

<body class="bg-light">

    <!-- Header -->
    <div th:replace="fragments/header :: header"></div>

    <div class="container py-4">
        <div class="card shadow-sm">
            <div class="card-body">
                <h3 class="card-title mb-4 text-center">
                    <i class="bi bi-shuffle"></i> Multi Encoder & Decoder
                </h3>

                <p class="text-muted text-center mb-4">Encode or decode text in Base64, URL, HTML, HEX, or Binary
                    formats.</p>

                <div class="row justify-content-center">
                    <div class="col-md-8">
                        <label class="form-label fw-bold" for="inputText">Input Text:</label>
                        <textarea id="inputText" class="form-control" rows="4"
                            placeholder="Enter or paste text..."></textarea>

                        <label class="form-label mt-3 fw-bold" for="method">Select Method:</label>
                        <select id="method" class="form-select">
                            <option value="base64">Base64</option>
                            <option value="url">URL Encode / Decode</option>
                            <option value="html">HTML Entities</option>
                            <option value="hex">Hexadecimal</option>
                            <option value="binary">Binary</option>
                        </select>

                        <div class="d-flex gap-2 mt-4">
                            <button class="btn btn-primary flex-fill" onclick="encodeText()">Encode</button>
                            <button class="btn btn-success flex-fill" onclick="decodeText()">Decode</button>
                            <button class="btn btn-secondary" onclick="clearFields()">Clear</button>
                        </div>

                        <label class="form-label mt-4 fw-bold">Result:</label>
                        <textarea id="resultText" class="form-control bg-light" rows="4" readonly></textarea>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Footer -->
    <div th:replace="fragments/footer :: footer"></div>

</body>

</html>
