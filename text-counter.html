<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title>Word & Letter Counter</title>
    <meta name="description"
        content="Count words, letters, characters, and spaces instantly with the WebTools Word & Letter Counter." />
    <meta property="og:type" content="website">
    <meta property="og:site_name" content="WebTools">
    <meta name="robots" content="index, follow">
    <link rel="canonical" href="https://mywebtools.it.com/text-counter" />

    <!-- ✅ Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

    <div th:replace="fragments/header :: header"></div>

    <div class="container py-5">
        <div class="card shadow-sm mx-auto" style="max-width: 700px;">
            <div class="card-body">
                <h3 class="card-title mb-4 text-center">Word & Letter Counter</h3>

                <form action="/text-counter/process" method="post">
                    <div class="mb-3">
                        <label for="text" class="form-label fw-bold">Enter your text:</label>
                        <textarea id="text" name="text" class="form-control" rows="8"
                            placeholder="Type or paste text here..." th:text="${text}"></textarea>
                    </div>

                    <div class="mb-3">
                        <label class="form-label fw-bold">Letter Counting Options:</label><br>
                        <div class="form-check form-check-inline">
                            <input class="form-check-input" type="radio" name="includeSpaces" value="include"
                                th:checked="${includeSpaces == 'include'}">
                            <label class="form-check-label">Include spaces</label>
                        </div>
                        <div class="form-check form-check-inline">
                            <input class="form-check-input" type="radio" name="includeSpaces" value="exclude"
                                th:checked="${includeSpaces == 'exclude'}">
                            <label class="form-check-label">Exclude spaces</label>
                        </div>
                    </div>


                    <div class="d-flex justify-content-center gap-3 mt-4">
                        <button type="submit" name="action" value="countWords" class="btn btn-primary px-4">
                            <i class="bi bi-type"></i> Count Words
                        </button>
                        <button type="submit" name="action" value="countLetters" class="btn btn-success px-4">
                            <i class="bi bi-pencil"></i> Count Letters
                        </button>
                        <button type="submit" name="action" value="clear" class="btn btn-outline-secondary px-4">
                            <i class="bi bi-x-circle"></i> Clear
                        </button>
                    </div>

                    <div class="mt-4 text-center">
                        <div class="alert alert-info d-inline-block px-4 py-2 fw-bold" th:text="${result}">
                            Result will appear here.
                        </div>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <!-- ✅ Include Footer Fragment -->
    <div th:replace="fragments/footer :: footer"></div>


</body>

</html>
